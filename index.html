<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MENDADAK BUKBER IANA</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
  body{
    margin:0;
    font-family:'Montserrat',sans-serif;
    background:#f8f5f2;
    text-align:center;
  }

  .card{
    width:92%;
    max-width:480px; /* diperkecil */
    margin:20px auto;
    background:white;
    padding:25px 18px; /* lebih kecil */
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.06);
  }

  h1{
    font-family:'Playfair Display',serif;
    font-size:28px; /* lebih kecil */
    margin:0;
  }

  p{
    margin:6px 0;
    font-size:14px;
  }

  h3{
    margin-top:20px;
    font-size:16px;
  }

  input, textarea{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:6px;
    border:1px solid #ddd;
    font-family:inherit;
    font-size:14px;
    box-sizing:border-box;
  }

  button{
    width:100%;
    padding:10px;
    border:none;
    background:#c8a96a;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-size:14px;
  }

  .comment{
    text-align:left;
    background:#fafafa;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    font-size:13px;
  }

  /* tambahan khusus mobile */
  @media (max-width:480px){
    .card{
      margin:15px auto;
      padding:20px 14px;
    }

    h1{
      font-size:24px;
    }
  }
</style>
</head>

<body>
<div class="card">
  <h1>MENDADAK BUKBER IANA</h1>
  <p>📅 7 Maret 2026</p>
  <p>📍 Grand Whiz</p>
  <p>💰 Rp 190.000 / orang</p>

  <hr style="margin:30px 0;">

  <h3>Guest Comment</h3>

  <input type="text" id="name" placeholder="Nama kamu"/>
  <textarea id="message" rows="3" placeholder="Tulis pesan..."></textarea>
  <button onclick="submitComment()">Kirim</button>

  <div id="comments" style="margin-top:20px;"></div>
</div>

<script>
  const client = supabase.createClient(
    "https://mnxhweqpdcmjkddcprwx.supabase.co",
    "sb_publishable_2lD_q5LsH1QJujWzUR1P0A_Z2Z9Hjwv"
  );

  async function loadComments(){
    const { data } = await client
      .from('iana_iftar')
      .select('*')
      .order('created_at', { ascending: false });

    const container = document.getElementById('comments');
    container.innerHTML = '';
    data.forEach(c => {
      container.innerHTML += `
        <div class="comment">
          <b>${c.name}</b><br/>
          ${c.message}
        </div>
      `;
    });
  }

  async function submitComment(){
    const name = document.getElementById('name').value;
    const message = document.getElementById('message').value;

    if(!name || !message) return alert("Isi dulu ya.");

    await client.from('iana_iftar').insert([{ name, message }]);

    document.getElementById('name').value = '';
    document.getElementById('message').value = '';

    loadComments();
  }

  loadComments();
</script>

</body>
</html>
