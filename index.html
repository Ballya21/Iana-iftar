<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MENDADAK BUKBER IANA</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
  body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  text-align:center;
  background: radial-gradient(circle at top, #1a1a1a 0%, #0d0d0d 60%, #000 100%);
  color:#f5f5f5;
  overflow-x:hidden;
}
  /* particles layer */
  #particles{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* smooth scroll */
  html{
  scroll-behavior:smooth;
}

  .card{
  width:92%;
  max-width:480px;
  margin:20px auto;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(12px);
  padding:25px 18px;
  border-radius:18px;
  border:1px solid rgba(212,175,55,0.15);
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

  h1{
    font-family:'Playfair Display',serif;
    font-size:28px; /* lebih kecil */
    margin:0;
  }

  p{
    margin:6px 0;
    font-size:14px;
  }

  h3{
    margin-top:20px;
    font-size:16px;
  }

  input, textarea{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:6px;
    border:1px solid #ddd;
    font-family:inherit;
    font-size:14px;
    box-sizing:border-box;
  }

  button{
    width:100%;
    padding:10px;
    border:none;
    background:#c8a96a;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-size:14px;
  }

  .comment{
  background:rgba(255,255,255,0.05);
  padding:14px;
  border-radius:14px;
  border:1px solid rgba(212,175,55,0.15);
  animation:fadeUp 0.6s ease forwards;
  opacity:0;
  width:100%;
  max-width:520px;
  margin:0 auto;
  text-align:left;
}

@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
  from{
    opacity:0;
    transform:translateY(10px);
  }
}

.comment-header{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}

.avatar{
  width:34px;
  height:34px;
  border-radius:50%;
  background:linear-gradient(135deg,#d4af37,#f4d27a);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:#000;
}

.time{
  font-size:10px;
  color:#aaa;
}

.message{
  font-size:13px;
}

  /* tambahan khusus mobile */
  @media (max-width:480px){
    .card{
      margin:15px auto;
      padding:20px 14px;
    }

    h1{
      font-size:24px;
    }
  }

  /* subtle blur */
.header-bg::before{
  content:"";
  position:absolute;
  inset:0;
  backdrop-filter: blur(4px);
}

/* dark luxury gradient */
.overlay{
  position:absolute;
  inset:0;
  background: linear-gradient(
    180deg,
    rgba(0,0,0,0.80) 0%,
    rgba(0,0,0,0.65) 50%,
    rgba(0,0,0,0.90) 100%
  );
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:0 20px;
}

.header-content{
  position:relative;
  z-index:2;
}

/* moon icon */
.moon{
  font-size:26px;
  color:#f4d27a;
  margin-bottom:10px;
  text-shadow:0 0 15px rgba(212,175,55,0.7);
}

/* shimmer animation */
.gold-text{
  font-family:'Playfair Display', serif;
  font-size:28px;
  margin:0;
  letter-spacing:1px;
  background: linear-gradient(
    90deg,
    #d4af37,
    #f4d27a,
    #ffffff,
    #f4d27a,
    #d4af37
  );
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation: shimmer 6s infinite linear;
}

@keyframes shimmer{
  0%{ background-position:0% }
  100%{ background-position:300% }
}

.subtitle-top{
  font-size:11px;
  letter-spacing:3px;
  color:#e8d8a8;
  margin-bottom:8px;
}

.subtitle-bottom{
  font-size:12px;
  color:#ddd;
  margin-top:12px;
  letter-spacing:2px;
}

/* gold divider */
.gold-divider{
  width:60px;
  height:2px;
  margin:14px auto;
  background: linear-gradient(to right, transparent, #d4af37, transparent);
  box-shadow:0 0 10px rgba(212,175,55,0.6);
}

  .countdown{
  display:flex;

<canvas id="particles"></canvas>
<script>
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<60;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2+1,
    d:Math.random()*0.5+0.2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="rgba(212,175,55,0.6)";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
    p.y-=p.d;
    if(p.y<0){
      p.y=canvas.height;
      p.x=Math.random()*canvas.width;
    }
  });
  requestAnimationFrame(draw);
}
draw();
</script>
<script>
const target = new Date("March 7, 2026 18:00:00").getTime();

setInterval(()=>{
  const now = new Date().getTime();
  const distance = target - now;

  const days = Math.floor(distance / (1000*60*60*24));
  const hours = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
  const minutes = Math.floor((distance % (1000*60*60))/(1000*60));

  document.getElementById("days").innerText = days;
  document.getElementById("hours").innerText = hours;
  document.getElementById("minutes").innerText = minutes;
},1000);
</script>
