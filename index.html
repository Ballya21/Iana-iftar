<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MENDADAK BUKBER IANA</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
  body{
    margin:0;
    font-family:'Montserrat',sans-serif;
    text-align:center;
    background: radial-gradient(circle at top, #1a1a1a 0%, #0d0d0d 60%, #000 100%);
    color:#f5f5f5;
    overflow-x:hidden;
  }

  #particles{
    position:fixed;
    inset:0;
    z-index:-1;
  }

  html{ scroll-behavior:smooth; }

  .card{
    width:92%;
    max-width:480px;
    margin:20px auto;
    background: rgba(212,175,55,0.04);
    backdrop-filter: blur(12px);
    padding:25px 18px;
    border-radius:18px;
    border:1px solid rgba(212,175,55,0.25);
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
  }

  p{ margin:6px 0; font-size:16px; color:#e8d5a3;}
  h3{ margin-top:20px; font-size:16px; }

  input, textarea{
    width:100%;
    padding:12px 14px;
    margin:6px 0;
    border-radius:10px;
    border:1px solid rgba(212,175,55,0.25);
    font-family:inherit;
    font-size:14px;
    box-sizing:border-box;
    background: linear-gradient(145deg, rgba(20,20,20,0.95), rgba(10,10,10,0.95));
    color:#e8d5a3;
    outline:none;
    transition:all .3s ease;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.03);
  }

  input::placeholder, textarea::placeholder{ color:rgba(200,169,106,0.4); }

  input:focus, textarea:focus{
    border-color:rgba(212,175,55,0.7);
    background: linear-gradient(145deg, rgba(15,12,0,0.98), rgba(8,6,0,0.98));
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.6), 0 0 0 3px rgba(212,175,55,0.15), 0 0 20px rgba(212,175,55,0.08);
  }

  button{
    width:100%;
    padding:12px;
    border:none;
    background: linear-gradient(135deg, #c8a96a 0%, #d4af37 50%, #b8943a 100%);
    color:#1a1200;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
    font-weight:600;
    font-family:inherit;
    letter-spacing:0.5px;
    transition:all .3s ease;
    box-shadow: 0 4px 15px rgba(212,175,55,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
    margin-top:4px;
  }

  button:hover{
    transform:translateY(-2px);
    box-shadow: 0 8px 25px rgba(212,175,55,0.45), inset 0 1px 0 rgba(255,255,255,0.25);
    background: linear-gradient(135deg, #d4b87a 0%, #e0bc45 50%, #c8a44a 100%);
  }

  button:active{ transform:translateY(0px); box-shadow:0 2px 8px rgba(212,175,55,0.25); }

  .comment{
    position:relative;
    margin:12px 0;
    padding:18px 20px;
    border-radius:18px;
    background:linear-gradient(145deg, rgba(30,30,30,0.95), rgba(15,15,15,0.95));
    border:1px solid rgba(212,175,55,0.25);
    box-shadow: 0 8px 30px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.03);
    backdrop-filter: blur(10px);
    transition:all .3s ease;
  }

  .comment:hover{
    transform:translateY(-4px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.7), 0 0 20px rgba(212,175,55,0.15);
  }

  .comment::before{
    content:"";
    position:absolute;
    top:0; left:0;
    height:100%; width:4px;
    border-radius:18px 0 0 18px;
    background:linear-gradient(to bottom,#d4af37,#f4d27a);
  }

  .comment b{ font-size:14px; letter-spacing:.5px; color:#f4d27a; }
  .comment-header{ display:flex; align-items:center; gap:10px; margin-bottom:8px; }

  .avatar{
    width:34px; height:34px;
    border-radius:50%;
    background:linear-gradient(135deg,#d4af37,#f4d27a);
    display:flex; align-items:center; justify-content:center;
    font-weight:bold; color:#000;
    flex-shrink:0;
  }

  .time{ font-size:10px; color:#aaa; }
  .message{ font-size:13px; line-height:1.6; color:#eaeaea; margin-top:6px; }

  @media (max-width:480px){
    .card{ margin:15px auto; padding:20px 14px; }
  }

  /* ===== HEADER ===== */
  .header-bg{
    width:100%;
    height:220px;
    border-radius:16px 16px 0 0;
    overflow:hidden;
    position:relative;
    background-image: url("https://mnxhweqpdcmjkddcprwx.supabase.co/storage/v1/object/public/iana/iana_background.jpg");
    background-size:cover;
    background-position:center;
  }

  .header-bg::before{
    content:"";
    position:absolute;
    inset:0;
    backdrop-filter: blur(4px);
  }

  .overlay{
    position:absolute;
    inset:0;
    background: linear-gradient(180deg, rgba(0,0,0,0.80) 0%, rgba(0,0,0,0.65) 50%, rgba(0,0,0,0.90) 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 20px;
  }

  .header-content{ position:relative; z-index:2; width:100%; }

  .moon{
    font-size:26px;
    color:#f4d27a;
    margin-bottom:10px;
    text-shadow:0 0 15px rgba(212,175,55,0.7);
  }

  /* ===== TITLE PNG dengan shimmer ===== */
  .gold-text{
    display:block;
    width:100%;
    max-width:340px;
    height:70px;
    margin:0 auto;

    /* shimmer gradient sebagai "cat" */
    background: linear-gradient(90deg, #d4af37, #f4d27a, #ffffff, #f4d27a, #d4af37);
    background-size:300%;
    animation: shimmer 6s infinite linear;

    /* PNG transparan sebagai topeng — hanya bentuk logo yang muncul */
    -webkit-mask-image: url("https://mnxhweqpdcmjkddcprwx.supabase.co/storage/v1/object/public/iana/Mendadak_Iana_Bukber_2026.png");
    -webkit-mask-size: contain;
    -webkit-mask-repeat: no-repeat;
    -webkit-mask-position: center;
    mask-image: url("https://mnxhweqpdcmjkddcprwx.supabase.co/storage/v1/object/public/iana/Mendadak_Iana_Bukber_2026.png");
    mask-size: contain;
    mask-repeat: no-repeat;
    mask-position: center;
  }

  @keyframes shimmer{
    0%{ background-position:0% }
    100%{ background-position:300% }
  }

  .subtitle-top{ font-size:11px; letter-spacing:5px; color:#e8d8a8; margin-bottom:8px; }
  .subtitle-bottom{ font-size:12px; color:#ddd; margin-top:12px; letter-spacing:2px; }

  .gold-divider{
    width:60px; height:2px;
    margin:14px auto;
    background: linear-gradient(to right, transparent, #d4af37, transparent);
    box-shadow:0 0 10px rgba(212,175,55,0.6);
  }

  .countdown{ display:flex; justify-content:center; gap:15px; margin:20px 0; }

  .countdown div{
    background:rgba(255,255,255,0.05);
    padding:10px 14px;
    border-radius:10px;
    border:1px solid rgba(212,175,55,0.2);
    box-shadow: 0 0 15px rgba(212,175,55,0.1);
  }

  .countdown span{ font-size:18px; color:#ffe98a; display:block; }
  .countdown small{ font-size:10px; color:#aaa; }
  </style>
</head>

<body>
<div class="card">
  <div class="header-bg">
    <div class="overlay">
      <div class="header-content">
        <div class="moon">☾</div>
        <p class="subtitle-top">YOU ARE INVITED TO</p>
        <div class="gold-text"></div>
        <div class="gold-divider"></div>
        <p class="subtitle-bottom">Ramadhan Gathering 2026</p>
      </div>
    </div>
  </div>

  <div class="countdown">
    <div><span id="days">0</span><small>Hari</small></div>
    <div><span id="hours">0</span><small>Jam</small></div>
    <div><span id="minutes">0</span><small>Menit</small></div>
  </div>

  <p>📅 7 Maret 2026</p>
  <p>💰 Rp 190.000 / orang</p>

  <div style="margin-top:20px;">
    <p>📍 Grand Whiz Poins Simatupang Jakarta</p>
    <div style="border-radius:12px; overflow:hidden; box-shadow:0 0 20px rgba(212,175,55,0.15), 0 6px 18px rgba(0,0,0,0.4); border:1px solid rgba(212,175,55,0.2);">
      <iframe
              src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d7931.604071242892!2d106.775351!3d-6.289731!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e69f1ce1980d2a3%3A0xe6757bc534626033!2sGrand%20Whiz%20Poins%20Simatupang%20Jakarta!5e0!3m2!1sid!2skr!4v1772331409907!5m2!1sid!2skr"
              width="100%" height="200" style="border:0;" allowfullscreen="" loading="lazy">
      </iframe>
    </div>
    <a href="https://www.google.com/maps/place/Grand+Whiz+Poins+Simatupang+Jakarta/@-6.289946,106.778151,14z/data=!4m9!3m8!1s0x2e69f1ce1980d2a3:0xe6757bc534626033!5m2!4m1!1i2!8m2!3d-6.2899462!4d106.7781514!16s%2Fg%2F11c2jl0gy8?hl=id&entry=ttu&g_ep=EgoyMDI2MDIyNS4wIKXMDSoASAFQAw%3D%3D" target="_blank" style="display:block; font-size:12px; color:#c8a96a; margin-top:8px; letter-spacing:1px; text-decoration:none;">↗ Buka di Google Maps</a>
  </div>

  <div style="width:60px; height:2px; margin:30px auto; background:linear-gradient(to right, transparent, #d4af37, transparent); box-shadow:0 0 10px rgba(212,175,55,0.6);"></div>

  <h3>Guest Comment</h3>
  <input type="text" id="name" placeholder="Nama kamu"/>
  <textarea id="message" rows="3" placeholder="Tulis pesan..."></textarea>
  <button onclick="submitComment()">Kirim</button>

  <div id="comments" style="margin-top:20px;"></div>
</div>

<script>
  const client = supabase.createClient(
    "https://mnxhweqpdcmjkddcprwx.supabase.co",
    "sb_publishable_2lD_q5LsH1QJujWzUR1P0A_Z2Z9Hjwv"
  );

  async function loadComments(){
    const { data } = await client
      .from('iana_iftar')
      .select('*')
      .order('created_at', { ascending: false });

    const container = document.getElementById('comments');
    container.innerHTML = '';
    data.forEach(c => {
      const initials = c.name.charAt(0).toUpperCase();
      const time = new Date(c.created_at).toLocaleString('id-ID');

      const div = document.createElement('div');
      div.className = 'comment';

      const header = document.createElement('div');
      header.className = 'comment-header';

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = initials;

      const info = document.createElement('div');
      const bold = document.createElement('b');
      bold.textContent = c.name;
      const timeEl = document.createElement('div');
      timeEl.className = 'time';
      timeEl.textContent = time;
      info.appendChild(bold);
      info.appendChild(timeEl);

      header.appendChild(avatar);
      header.appendChild(info);

      const message = document.createElement('div');
      message.className = 'message';
      message.textContent = c.message;

      div.appendChild(header);
      div.appendChild(message);
      container.appendChild(div);
    });
  }

  async function submitComment(){
    const name = document.getElementById('name').value.trim();
    const message = document.getElementById('message').value.trim();
    const btn = document.querySelector('button');

    if(!name || !message) return alert("Isi dulu ya.");

    btn.disabled = true;
    btn.textContent = 'Mengirim...';

    const { error } = await client.from('iana_iftar').insert([{ name, message }]);

    if(error){
      alert("Gagal kirim, coba lagi ya.");
    } else {
      document.getElementById('name').value = '';
      document.getElementById('message').value = '';
      await loadComments();
    }

    btn.disabled = false;
    btn.textContent = 'Kirim';
  }

  loadComments();
</script>

<canvas id="particles"></canvas>
<script>
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  let particles = [];
  for(let i=0; i<60; i++){
    particles.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      r: Math.random()*2+1,
      d: Math.random()*0.5+0.2
    });
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="rgba(212,175,55,0.6)";
    particles.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();
      p.y -= p.d;
      if(p.y < 0){ p.y = canvas.height; p.x = Math.random()*canvas.width; }
    });
    requestAnimationFrame(draw);
  }
  draw();
</script>

<script>
  const target = new Date("March 7, 2026 18:00:00").getTime();
  setInterval(()=>{
    const now = new Date().getTime();
    const distance = target - now;
    document.getElementById("days").innerText    = Math.floor(distance / (1000*60*60*24));
    document.getElementById("hours").innerText   = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    document.getElementById("minutes").innerText = Math.floor((distance % (1000*60*60)) / (1000*60));
  }, 1000);
</script>
</body>
</html>
