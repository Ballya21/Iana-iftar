<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MENDADAK BUKBER IANA</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f8f5f2;
      font-family: 'Montserrat', sans-serif;
      color: #333;
      text-align: center;
    }

    .card {
      max-width: 650px;
      margin: 50px auto;
      background: #ffffff;
      padding: 50px 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 16px;
      letter-spacing: 3px;
      margin-bottom: 30px;
      color: #777;
    }

    .event-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      margin: 20px 0;
    }

    .details {
      font-size: 18px;
      margin: 10px 0;
    }

    .price {
      margin-top: 25px;
      font-size: 20px;
      font-weight: 600;
    }

    .footer {
      margin-top: 40px;
      font-size: 14px;
      color: #888;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: #c8a96a;
      margin: 25px auto;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="subtitle">YOU ARE INVITED TO</div>

  <h1>MENDADAK BUKBER</h1>
  <div class="event-title">IANA</div>

  <div class="divider"></div>

  <div class="details">
    📅 Sabtu, 7 Maret 2026
  </div>

  <div class="details">
    📍 Grand Whiz
  </div>

  <div class="price">
    💰 Rp 190.000 / orang
  </div>

  <div class="divider"></div>

  <div class="footer">
    Kehadiran kamu ditunggu ya ✨
  </div>
</div>

</body>
</html>
